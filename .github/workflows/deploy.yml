name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.PROD_SERVER_PATH }}
            git pull origin main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build backend frontend
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull postgresql redis
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T backend alembic upgrade head
            echo 'Deploy OK'
