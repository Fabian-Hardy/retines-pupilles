name: Codex auto-task

# Manual Codex task runner.
#
# Prerequisites:
# - Repository secret: CODEX_ACCESS_TOKEN
# - Settings -> Actions -> General -> Workflow permissions:
#   "Read and write permissions"
# - Settings -> Actions -> General:
#   "Allow GitHub Actions to create and approve pull requests"
#
# Usage:
# - Create or update a task file under _tasks/*.md.
# - Run this workflow manually with task_file set to that path.
# - The workflow creates a chatgpt/<task-name> branch and opens a PR to develop.

on:
  workflow_dispatch:
    inputs:
      task_file:
        description: "Task file path, for example _tasks/task-010-patient-list-filtering-pagination.md"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: codex-auto-task-${{ github.event.inputs.task_file }}
  cancel-in-progress: false

jobs:
  run-codex:
    name: Run Codex on task file
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: develop

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Codex CLI
        run: |
          # Pin Codex CLI instead of using @latest.
          # A previous successful run used v0.134.0, while v0.135.0 returned 401 Unauthorized.
          npm install -g @openai/codex@0.134.0
          npm install -g @openai/codex-linux-x64@0.134.0 || true
          codex --version

      - name: Resolve task file
        run: |
          TASK_FILE="${{ github.event.inputs.task_file }}"
          case "$TASK_FILE" in
            _tasks/_done/*) echo "Task is already archived: $TASK_FILE"; exit 1 ;;
            _tasks/*.md) ;;
            *) echo "Unauthorized task path: $TASK_FILE"; exit 1 ;;
          esac
          if [ ! -f "$TASK_FILE" ]; then
            echo "Task file not found: $TASK_FILE"
            exit 1
          fi
          echo "TASK_FILE=$TASK_FILE" >> "$GITHUB_ENV"
          echo "Task: $TASK_FILE"

      - name: Create task branch
        run: |
          TASK_NAME=$(basename "$TASK_FILE" .md)
          BRANCH="chatgpt/${TASK_NAME}"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"
          git checkout -b "$BRANCH"

      - name: Run Codex on task file
        env:
          CODEX_ACCESS_TOKEN: ${{ secrets.CODEX_ACCESS_TOKEN }}
        run: |
          echo "Running Codex on: $TASK_FILE"
          codex exec --sandbox danger-full-access "$(cat "$TASK_FILE")"

      - name: Commit and push
        run: |
          git config user.name "Codex Bot"
          git config user.email "codex-bot@github-actions"
          git add .
          if git diff --staged --quiet; then
            echo "No changes produced by Codex."
            exit 0
          fi
          git commit -m "feat: codex auto-task - $(basename "$TASK_FILE" .md)"
          git push origin "$BRANCH"

      - name: Open PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git log develop..HEAD --oneline | grep -q .; then
            gh pr create \
              --title "Codex: $(head -1 "$TASK_FILE")" \
              --body "$(cat "$TASK_FILE")" \
              --base develop \
              --head "$BRANCH"
            echo "PR opened for $BRANCH"
          else
            echo "No commit found after Codex run. No PR created."
          fi
